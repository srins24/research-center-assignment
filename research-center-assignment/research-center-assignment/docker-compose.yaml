version: "3.9"

services:
  classifier:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research-center-classifier
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env.draft
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
      # Mount updated model artefact without rebuilding the image
      - ./cluster_model.pkl:/app/cluster_model.pkl:ro
